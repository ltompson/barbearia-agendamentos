spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8080
  server:
    error:
      include-message: always
      include-binding-errors: always
      include-stacktrace: always

jwt:
  secret: alquimista-barbearia-secret-key-2026-super-segura
  expiration: 86400000 # 24 horas em ms

